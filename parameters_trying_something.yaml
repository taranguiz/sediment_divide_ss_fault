#config file for parameters
saving:
  model_name: 'Sediment_4_Duvall_Tucker_5' #'S05_K_D_C'
  home_path: '/Users/taranguiz/Research/sediment_divide_ss_fault'
  output_filetype: 'netcdf' # netcdf or pickle
  frequency_output: 10000 # how often do we want to save the grids for dynamic_loop in years

comments:
  alt_name: 'Sediment_4_Duvall_Tucker_5_no_fines'

shape:
  ymax: 200
  xmax: 4000
  dxy: 5 #spacing

geomorphology:
  H0: 5  #original soil depth
  uplift_rate: 0.001 #1.0e-3
  Sc: 1 #1 #critical slope for hillslope diffusion
  Hstar_d: 0.1 #1 characteristic transport depth, m
  V0: 0.08 #10 #0.1 #0.1 #transport velocity coefficient, D: Hstar*V0 #effective(maximum) diffusivity
  Hstar_w: 1 #characteristic transport depth for weathering
  P0: 0.0001 #maximum soil production rate
  run_off: 1 #run off rate
  K_sed: 0.00234 #sediment erodibility 0.000067
  K_br: 0.000234 #bedrock erodibility 0.000053
  F_f: 0 #fraction of fine sediment
  phi: 0 #sediment porosity
  Hstar_f: 0.1 #sediment entrainment lenght scale
  Vs: 1 #velocity of sediment
  m_sp: 0.5 #exponent ondrainage area stream power
  n_sp: 1.0 #exponent on channel slope in the stream power framework
  sp_crit_sed: 0.0 #sediment erosion threshold
  sp_crit_br: 0.0 #bedrock erosion threshold

tectonics:
  total_slip: 500 #120000.0
  method: 'roll' #or drop
  slip_rate: 5 # mm/yr

time:
  total_model_time: 100000 #6000000
  # This can also be used as start time after an initial run to start from the last run year
  total_steady_time: 300000 #total time for steady state
  dt_steady: 100
  dt_model: 100

climate:
  fluvial_freq: 100000 #how often the humid period occurs
  fluvial_len: 15000 #how long the humid period last
